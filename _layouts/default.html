<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Phat Nguyen</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
    <header>
        <a href="{{ '/' | relative_url }}" class="logo">phat nguyen</a>

        <div class="header-right">
            <nav id="main-nav">
                <a href="{{ '/' | relative_url }}">home</a>
                <a href="{{ '/blog/' | relative_url }}">blog</a>
                <a href="{{ '/about.html' | relative_url }}">about</a>
            </nav>

            <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="19.76" y1="19.76" x2="21.17" y2="21.17"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.76" x2="5.64" y2="21.17"></line>
                    <line x1="19.76" y1="4.22" x2="21.17" y2="5.64"></line>
                </svg>
            </button>
        </div>

        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search posts..." aria-label="Search posts">
            </div>
            <div id="results-container"></div>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>© 2026 Phat Nguyen.</span>
        <span id="current-date"></span>
    </footer>

    <button id="back-to-top" type="button" aria-label="Lên đầu trang">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"></path>
        </svg>
    </button>

    <script>
        const dateElement = document.getElementById('current-date');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const bodyElement = document.body;
        const moonIcon = document.querySelector('.moon-icon');
        const sunIcon = document.querySelector('.sun-icon');
        const backToTopBtn = document.getElementById('back-to-top');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let posts = [];
        let lastKnownScroll = 0;
        let isTicking = false;
        let searchReady = false;

        if (dateElement) {
            dateElement.textContent = new Date().toLocaleDateString('vi-VN');
        }

        function syncThemeIcons(isDark) {
            moonIcon.hidden = isDark;
            sunIcon.hidden = !isDark;
        }

        const currentTheme = localStorage.getItem('theme');
        const useDarkTheme = currentTheme === 'dark';
        bodyElement.classList.toggle('dark-mode', useDarkTheme);
        syncThemeIcons(useDarkTheme);

        themeToggleBtn.addEventListener('click', () => {
            const isDark = bodyElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            syncThemeIcons(isDark);
        });

        function updateBackToTop() {
            if (!backToTopBtn) return;
            backToTopBtn.classList.toggle('show', lastKnownScroll > 280);
            isTicking = false;
        }

        window.addEventListener('scroll', () => {
            lastKnownScroll = window.scrollY || document.documentElement.scrollTop;
            if (!isTicking) {
                window.requestAnimationFrame(updateBackToTop);
                isTicking = true;
            }
        }, { passive: true });

        if (backToTopBtn) {
            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: reduceMotion ? 'auto' : 'smooth'
                });
            });
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function hideResults() {
            if (resultsContainer) {
                resultsContainer.style.display = 'none';
            }
        }

        function renderResults(query) {
            if (!resultsContainer) return;

            const normalizedQuery = query.trim().toLowerCase();
            resultsContainer.innerHTML = '';

            if (!normalizedQuery) {
                hideResults();
                return;
            }

            if (!searchReady) {
                resultsContainer.style.display = 'block';
                resultsContainer.innerHTML = '<div class="no-results">Loading posts...</div>';
                return;
            }

            const filteredPosts = posts.filter((post) => {
                const haystack = [post.title, post.excerpt, post.content]
                    .filter(Boolean)
                    .join(' ')
                    .toLowerCase();
                return haystack.includes(normalizedQuery);
            }).slice(0, 8);

            resultsContainer.style.display = 'block';

            if (!filteredPosts.length) {
                resultsContainer.innerHTML = '<div class="no-results">No matching posts found.</div>';
                return;
            }

            filteredPosts.forEach((post) => {
                const link = document.createElement('a');
                link.href = post.url;
                link.className = 'search-result-item';
                link.innerHTML = `<span class="result-title">${escapeHtml(post.title)}</span><span class="result-date">${escapeHtml(post.date || '')}</span>`;
                resultsContainer.appendChild(link);
            });
        }

        fetch('{{ "/search.json" | relative_url }}')
            .then((response) => response.ok ? response.json() : Promise.reject(new Error('Search index unavailable')))
            .then((data) => {
                posts = Array.isArray(data) ? data : [];
                searchReady = true;
                if (searchInput && searchInput.value.trim()) {
                    renderResults(searchInput.value);
                }
            })
            .catch(() => {
                posts = [];
                searchReady = true;
                if (searchInput && searchInput.value.trim()) {
                    renderResults(searchInput.value);
                }
            });

        if (searchInput) {
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim()) {
                    renderResults(searchInput.value);
                }
            });

            searchInput.addEventListener('input', (event) => {
                renderResults(event.target.value);
            });
        }

        document.addEventListener('click', (event) => {
            if (!resultsContainer || !searchInput) return;
            const clickedInsideSearch = searchInput.contains(event.target) || resultsContainer.contains(event.target);
            if (!clickedInsideSearch) {
                hideResults();
            }
        });
    </script>
</body>
</html>
