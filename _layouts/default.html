<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Phat Nguyen</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
    <div class="theme-transition-overlay" aria-hidden="true"></div>

    <header>
        <a href="{{ '/' | relative_url }}" class="logo">phat nguyen</a>

        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search posts..." aria-label="Search posts">
            </div>
            <div id="results-container"></div>
        </div>

        <nav id="main-nav">
            <a href="{{ '/' | relative_url }}">home</a>
            <a href="{{ '/blog/' | relative_url }}">blog</a>
            <a href="{{ '/about.html' | relative_url }}">about</a>
        </nav>

        <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
            <svg class="theme-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3.4"></circle>
                <path d="M12 2.6v2.2"></path>
                <path d="M12 19.2v2.2"></path>
                <path d="M2.6 12h2.2"></path>
                <path d="M19.2 12h2.2"></path>
                <path d="M5.35 5.35l1.55 1.55"></path>
                <path d="M17.1 17.1l1.55 1.55"></path>
                <path d="M5.35 18.65l1.55-1.55"></path>
                <path d="M17.1 6.9l1.55-1.55"></path>
            </svg>
        </button>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>© 2026 Phat Nguyen.</span>
        <span id="current-date"></span>
    </footer>

    <button id="back-to-top" type="button" aria-label="Lên đầu trang">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"></path>
        </svg>
    </button>

    <script>
        const dateElement = document.getElementById('current-date');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const bodyElement = document.body;
        const themeOverlay = document.querySelector('.theme-transition-overlay');
        const backToTopBtn = document.getElementById('back-to-top');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const THEME_FADE_DURATION = 2500;
        const BLOG_INDEX_URL = '{{ "/blog/" | relative_url }}';
        const SEARCH_INDEX_URL = '{{ "/search.json" | relative_url }}';
        let posts = [];
        let lastKnownScroll = 0;
        let isTicking = false;
        let searchReady = false;
        let themeAnimating = false;

        if (dateElement) {
            dateElement.textContent = new Date().toLocaleDateString('vi-VN');
        }

        function clearThemeSweepClasses() {
            bodyElement.classList.remove('theme-transitioning', 'theme-sweep-dark', 'theme-sweep-light');
        }

        const currentTheme = localStorage.getItem('theme');
        const useDarkTheme = currentTheme === 'dark';
        bodyElement.classList.toggle('dark-mode', useDarkTheme);

        if (themeOverlay) {
            themeOverlay.addEventListener('animationend', clearThemeSweepClasses);
        }

        themeToggleBtn.addEventListener('click', () => {
            if (themeAnimating) return;

            const nextIsDark = !bodyElement.classList.contains('dark-mode');
            bodyElement.classList.toggle('dark-mode', nextIsDark);
            localStorage.setItem('theme', nextIsDark ? 'dark' : 'light');

            if (reduceMotion || !themeOverlay) {
                clearThemeSweepClasses();
                return;
            }

            themeAnimating = true;
            clearThemeSweepClasses();
            void themeOverlay.offsetWidth;
            bodyElement.classList.add('theme-transitioning', nextIsDark ? 'theme-sweep-dark' : 'theme-sweep-light');

            window.setTimeout(() => {
                themeAnimating = false;
            }, THEME_FADE_DURATION + 120);
        });

        function updateBackToTop() {
            if (!backToTopBtn) return;
            backToTopBtn.classList.toggle('show', lastKnownScroll > 280);
            isTicking = false;
        }

        window.addEventListener('scroll', () => {
            lastKnownScroll = window.scrollY || document.documentElement.scrollTop;
            if (!isTicking) {
                window.requestAnimationFrame(updateBackToTop);
                isTicking = true;
            }
        }, { passive: true });

        if (backToTopBtn) {
            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: reduceMotion ? 'auto' : 'smooth'
                });
            });
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function hideResults() {
            if (resultsContainer) {
                resultsContainer.style.display = 'none';
            }
        }

        function normalizePosts(items) {
            if (!Array.isArray(items)) return [];

            return items
                .filter((item) => item && item.title && item.url)
                .map((item) => ({
                    title: String(item.title || '').trim(),
                    url: String(item.url || '').trim(),
                    date: String(item.date || '').trim(),
                    excerpt: String(item.excerpt || '').trim(),
                    content: String(item.content || '').trim()
                }));
        }

        async function loadSearchJson() {
            const response = await fetch(SEARCH_INDEX_URL, { headers: { 'Accept': 'application/json, text/plain, */*' } });
            if (!response.ok) {
                throw new Error('Search index unavailable');
            }

            const rawText = await response.text();
            const trimmedText = rawText.trim();
            const jsonStart = trimmedText.indexOf('[');
            const jsonEnd = trimmedText.lastIndexOf(']');

            if (jsonStart === -1 || jsonEnd === -1 || jsonEnd <= jsonStart) {
                throw new Error('Search index is malformed');
            }

            const parsed = JSON.parse(trimmedText.slice(jsonStart, jsonEnd + 1));
            const normalized = normalizePosts(parsed);

            if (!normalized.length) {
                throw new Error('Search index is empty');
            }

            return normalized;
        }

        async function loadSearchFallback() {
            const response = await fetch(BLOG_INDEX_URL, { headers: { 'Accept': 'text/html, */*' } });
            if (!response.ok) {
                throw new Error('Blog index unavailable');
            }

            const markup = await response.text();
            const parser = new DOMParser();
            const documentNode = parser.parseFromString(markup, 'text/html');
            const cards = Array.from(documentNode.querySelectorAll('.blog-card'));
            const fallbackPosts = cards.map((card) => {
                const link = card.querySelector('h2 a');
                const excerpt = card.querySelector('p');
                const meta = card.querySelector('div');

                return {
                    title: link ? link.textContent.trim() : '',
                    url: link ? link.getAttribute('href') : '',
                    date: meta ? meta.textContent.trim() : '',
                    excerpt: excerpt ? excerpt.textContent.trim() : '',
                    content: excerpt ? excerpt.textContent.trim() : ''
                };
            });

            const normalized = normalizePosts(fallbackPosts);
            if (!normalized.length) {
                throw new Error('Fallback search index is empty');
            }

            return normalized;
        }

        async function bootstrapSearch() {
            try {
                posts = await loadSearchJson();
            } catch (searchIndexError) {
                try {
                    posts = await loadSearchFallback();
                } catch (fallbackError) {
                    posts = [];
                }
            } finally {
                searchReady = true;
                if (searchInput && searchInput.value.trim()) {
                    renderResults(searchInput.value);
                }
            }
        }

        function renderResults(query) {
            if (!resultsContainer) return;

            const normalizedQuery = query.trim().toLowerCase();
            resultsContainer.innerHTML = '';

            if (!normalizedQuery) {
                hideResults();
                return;
            }

            if (!searchReady) {
                resultsContainer.style.display = 'block';
                resultsContainer.innerHTML = '<div class="no-results">Loading posts...</div>';
                return;
            }

            const filteredPosts = posts.filter((post) => {
                const haystack = [post.title, post.excerpt, post.content]
                    .filter(Boolean)
                    .join(' ')
                    .toLowerCase();
                return haystack.includes(normalizedQuery);
            }).slice(0, 8);

            resultsContainer.style.display = 'block';

            if (!filteredPosts.length) {
                resultsContainer.innerHTML = '<div class="no-results">No matching posts found.</div>';
                return;
            }

            filteredPosts.forEach((post) => {
                const link = document.createElement('a');
                link.href = post.url;
                link.className = 'search-result-item';
                link.innerHTML = `<span class="result-title">${escapeHtml(post.title)}</span><span class="result-date">${escapeHtml(post.date || '')}</span>`;
                resultsContainer.appendChild(link);
            });
        }

        bootstrapSearch();

        if (searchInput) {
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim()) {
                    renderResults(searchInput.value);
                }
            });

            searchInput.addEventListener('input', (event) => {
                renderResults(event.target.value);
            });
        }

        document.addEventListener('click', (event) => {
            if (!resultsContainer || !searchInput) return;
            const clickedInsideSearch = searchInput.contains(event.target) || resultsContainer.contains(event.target);
            if (!clickedInsideSearch) {
                hideResults();
            }
        });
    </script>
</body>
</html>
